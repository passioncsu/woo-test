stages:
  - lint
  - test
  - build
  - deploy

variables:
  DOCKER_REGISTRY: registry.example.com
  APP_NAME: student-admin

# ========================================
# 阶段 1: 代码质量检查（并行）
# ========================================
lint-backend:
  stage: lint
  image: golangci/golangci-lint:v1.64
  script:
    - cd backend
    - golangci-lint run ./...
  rules:
    - changes:
        - backend/**/*
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint-frontend:
  stage: lint
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm run lint
  rules:
    - changes:
        - frontend/**/*
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ========================================
# 阶段 2: 测试（并行）
# ========================================
test-backend:
  stage: test
  image: golang:1.22-alpine
  services:
    - name: postgres:15-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: student_admin_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    APP_DATABASE_HOST: postgres
    APP_DATABASE_PORT: "5432"
    APP_DATABASE_USER: postgres
    APP_DATABASE_PASSWORD: postgres
    APP_DATABASE_DBNAME: student_admin_test
    APP_REDIS_HOST: redis
  script:
    - cd backend
    - go test ./... -v -coverprofile=coverage.txt -covermode=atomic
    - go tool cover -func=coverage.txt
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
  rules:
    - changes:
        - backend/**/*
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test-frontend:
  stage: test
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm run test:unit
  rules:
    - changes:
        - frontend/**/*
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ========================================
# 阶段 3: 构建镜像
# ========================================
build-backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - cd backend
    - docker build -t $DOCKER_REGISTRY/$APP_NAME-backend:$CI_COMMIT_SHORT_SHA .
    - docker build -t $DOCKER_REGISTRY/$APP_NAME-backend:latest .
    - docker push $DOCKER_REGISTRY/$APP_NAME-backend:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_REGISTRY/$APP_NAME-backend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

build-frontend:
  stage: build
  image: node:22-alpine
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm run build:antd
  artifacts:
    paths:
      - frontend/apps/web-antd/dist/
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ========================================
# 阶段 4: 部署
# ========================================
deploy-dev:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $DEV_SERVER_USER@$DEV_SERVER_HOST "
        cd /opt/$APP_NAME &&
        git pull origin develop &&
        docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build"
  environment:
    name: development
    url: https://dev-student-admin.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy-prod:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST "
        cd /opt/$APP_NAME &&
        git pull origin main &&
        docker-compose up -d --build"
  environment:
    name: production
    url: https://student-admin.example.com
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

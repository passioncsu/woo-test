# 开发环境覆盖配置
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: builder
    command: go run cmd/server/main.go
    volumes:
      - ../backend:/app
    environment:
      APP_SERVER_MODE: "debug"
    ports:
      - "8080:8080"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

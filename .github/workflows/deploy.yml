name: Deploy

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: hub.woody.vip/za7za8/woo-test-backend:latest
  FRONTEND_IMAGE: hub.woody.vip/za7za8/woo-test-frontend:latest
  PROD_HOST: ${{ secrets.PROD_SERVER_HOST }}
  PROD_USER: ${{ secrets.PROD_SERVER_USER }}

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Build backend image
        run: docker build -t ${{ env.BACKEND_IMAGE }} ./backend

      - name: Transfer backend image to server
        run: docker save ${{ env.BACKEND_IMAGE }} | gzip | ssh -i ~/.ssh/deploy_key ${{ env.PROD_USER }}@${{ env.PROD_HOST }} "docker load"

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t ${{ env.FRONTEND_IMAGE }} .

      - name: Transfer frontend image to server
        run: docker save ${{ env.FRONTEND_IMAGE }} | gzip | ssh -i ~/.ssh/deploy_key ${{ env.PROD_USER }}@${{ env.PROD_HOST }} "docker load"

      - name: Sync config files and deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.PROD_USER }}@${{ env.PROD_HOST }} << 'DEPLOY'
            cd /srv/woo-test
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Production deployment complete!"
          DEPLOY
